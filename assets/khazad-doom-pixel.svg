  <rect x="520" y="160" width="8" height="8" fill="#ffd166"/>
  <rect x="862" y="164" width="12" height="12" fill="#ff6b10"/>
  <rect x="898" y="204" width="8" height="8" fill="#ffd166"/>
  <rect x="430" y="334" width="10" height="10" fill="#ff6b10"/>
