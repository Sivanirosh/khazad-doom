name: CI

on:
  push:
    tags:
      - 'v*'
    branches:
      - '**'
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --all-targets
      - name: Check
        run: cargo check --all-targets
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Shared contract fixture
        run: tests/fixtures/contracts/generate --check
      - name: Node tests
        run: npm test
      - name: Workflow validation
        run: |
          cargo run --quiet -- slices validate --repo .
          scripts/roadmap-truth-check . docs/roadmap/auto-frontier/00-matrix.md
      - name: Script syntax
        run: bash -n scripts/install.sh scripts/package.sh tests/fixtures/contracts/generate

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: rust
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Package
        run: scripts/package.sh
      - name: Checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
