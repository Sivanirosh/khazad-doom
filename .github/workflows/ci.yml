name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Script syntax
        run: bash -n scripts/install.sh scripts/package.sh
